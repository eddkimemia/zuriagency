<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Zuri Agency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-surface-alt">
    <div class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full">
            <div class="text-center mb-8 anim-up">
                <a href="index.html" class="inline-flex items-center gap-2 mb-4">
                    <div class="w-10 h-10 rounded-xl bg-brand flex items-center justify-center text-white font-black text-xl">Z</div>
                    <span class="font-bold text-2xl tracking-tight">Zuri<span class="text-brand">Agency</span></span>
                </a>
                <h1 class="text-2xl font-bold">Create your account</h1>
                <p class="text-text-secondary text-sm mt-2">Join 10k+ smart investors today.</p>
            </div>

            <div class="card anim-up delay-1">
                <form id="registerForm" class="space-y-4" novalidate>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider mb-2" for="name">Full Name</label>
                        <input class="register-input" id="name" type="text" placeholder="John Mwangi" required>
                        <p class="register-error" id="nameError">Minimum 3 characters required.</p>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider mb-2" for="email">Email</label>
                        <input class="register-input" id="email" type="email" placeholder="john@email.com" required>
                        <p class="register-error" id="emailError">Invalid email address.</p>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider mb-2" for="phone">Phone Number</label>
                        <input class="register-input" id="phone" type="tel" placeholder="0712 345 678" required>
                        <p class="register-error" id="phoneError">Valid phone number required.</p>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider mb-2" for="password">Password</label>
                        <input class="register-input" id="password" type="password" placeholder="••••••••" required>
                        <p class="register-error" id="passwordError">Minimum 8 characters required.</p>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider mb-2" for="confirmPassword">Confirm Password</label>
                        <input class="register-input" id="confirmPassword" type="password" placeholder="••••••••" required>
                        <p class="register-error" id="confirmPasswordError">Passwords do not match.</p>
                    </div>
                    <button type="submit" class="btn-primary w-full py-3.5 mt-2">Create Account</button>
                    <p id="successMessage" class="text-center text-accent-green font-bold hidden">Success! Redirecting...</p>
                </form>
            </div>

            <p class="text-center text-sm text-text-secondary mt-6 anim-up delay-2">
                Already have an account? <a href="index.html" class="text-brand font-bold hover:underline">Sign in</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
